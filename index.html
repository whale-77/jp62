let UW={};
function loadU(){try{const s=localStorage.getItem('uw6b');if(s)UW=JSON.parse(s);}catch(e){}}
function saveU(){try{localStorage.setItem('uw6b',JSON.stringify(UW));}catch(e){}}
loadU();

function hl(t,id){
  const vm=V[id]||{};const uw=UW[id]||[];const all=[];
  Object.keys(vm).forEach(w=>all.push({w,k:vm[w],c:'v'}));
  uw.forEach(o=>{if(!vm[o.w])all.push({w:o.w,k:o.k||'',c:'u'});});
  if(!all.length)return t;
  all.sort((a,b)=>b.w.length-a.w.length);
  const esc=all.map(x=>x.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const re=new RegExp('('+esc.join('|')+')','g');
  return t.replace(re,m=>{const o=all.find(x=>x.w===m);if(!o)return m;return '<span class="'+o.c+'"><span class="kh">'+(o.k||'')+'</span><span class="kj">'+m+'</span></span>';});
}
function hp(t,id){return t.split('\n').map(p=>'<p>'+hl(p,id)+'</p>').join('');}
function cp(t){return t.split('\n').map(p=>'<p>'+p+'</p>').join('');}

let _kr=null;
function kmShow(w){document.getElementById('kmw').textContent=w;const i=document.getElementById('kmi');i.value='';document.getElementById('km').classList.add('show');setTimeout(()=>i.focus(),100);return new Promise(r=>{_kr=r;});}

async function onSel(){if(!selMode)return;const s=window.getSelection();const txt=s.toString().trim();if(!txt||txt.length<1||txt.length>20)return;const lid=getActiveLessonId();if(!lid)return;s.removeAllRanges();if(!UW[lid])UW[lid]=[];const idx=UW[lid].findIndex(o=>o.w===txt);if(idx>=0){UW[lid].splice(idx,1);saveU();rerender();toast('已移除：'+txt);}else{const kana=await kmShow(txt);if(kana===null)return;UW[lid].push({w:txt,k:kana});saveU();rerender();toast('已添加：'+txt+(kana?' ('+kana+')':''));}}
function getActiveLessonId(){const a=document.querySelector('.L.on');return a?a.dataset.lid:null;}
function rerender(){const lid=getActiveLessonId();if(!lid)return;const a=document.querySelector('.L.on');const secs=a.querySelectorAll('.jp');const lesson=lessons.find(l=>''+l.id===lid);if(!lesson)return;lesson.sections.forEach((s,j)=>{if(secs[j])secs[j].innerHTML=hp(s.jp,''+lesson.id);});updateVi(a);}
function updateVi(el){let vi=el.querySelector('.vi');const vc=(el.innerHTML.match(/<span class="v">/g)||[]).length;const uc=(el.innerHTML.match(/<span class="u">/g)||[]).length;let t='📙 教材生词 <b style="color:var(--vc)">'+vc+'</b> 处';if(uc>0)t+=' · ✏️ 自选 <b style="color:var(--uc)">'+uc+'</b> 处';if(vi)vi.innerHTML=t;}

const lessons=[
{id:1,num:"第1課",title:"「まあまあ」にみる日本人の心",author:"森本哲郎",sections:[
{jp:"「そいつは、まあ、なんだな……。」、「まあ、いいじゃないか。」、「まあ、一杯。」、「まあ、そんなに遠慮せずに。」、「まあ、待ちなさい。」、「まあ、ひどい！」……。\n日本語の中で、いちばん便利な言葉は、「まあ」という慣用語であろう。便利ということは、多義語ということである。つまり、どんな場合にも、いろいろな形で使うことができるということだ。「そいつは、まあ、なんだな……。」というときの「まあ」は、いわば語句の間に挿入される間投詞とみてよかろうが、「まあ、いいじゃないか。」という場合の「まあ」は、相手を促す意味を持っている。次の「まあ、一杯。」も同様だが、こちらの原義は、「先ず。」ということであろう。次の「まあ、遠慮せずに。」「まあ、待ちなさい。」というときの「まあ」は逆に相手を制止する用法で、最後の「まあ、ひどい！」の場合は感嘆詞といってよかろう。",cn:"\"那个嘛，怎么说呢……\"\"嘛，挺好的嘛。\"\"来来来，干一杯。\"\"嘛，别这么客气嘛。\"\"嘛，你等一下。\"\"哎呀，太过分了！\"……\n在日语中，最好用的词恐怕要数\"まあ\"这个惯用语了。好用，就意味着它是个多义词——也就是说，不论什么场合，都能以各种形式派上用场。\"那个嘛，怎么说呢……\"中的\"まあ\"，可以看作是穿插在语句之间的感叹词；而\"嘛，挺好的嘛\"里的\"まあ\"，则带有催促对方接受的意味。紧接着的\"来来来，干一杯\"用法类似，不过其本义应当是\"先（来一杯）\"。再往下，\"嘛，别客气\"\"嘛，你等一下\"中的\"まあ\"用法恰好相反，是制止对方的意思；至于最后那句\"哎呀，太过分了！\"中的\"まあ\"，则无疑是感叹词了。"},
{jp:"こんなふうに「まあ」はさまざまな形で使われ、しかも、その間に微妙な意味の濃淡がある。更にその「まあ」を二つ重ねて「まあまあ」となると、これはとうてい厳密に意味を分析できない日本語独特の表現となる。「お元気ですか？」ときかれて、「ええ、まあまあです。」と答えれば、特別に異状のないことを表し、「あしたの天気はまあまあでしょう。」と言えば、快晴というわけではないが、さりとて雨が降るほど悪くもないという意味である。強いて英語に訳せば、not bad（悪くない）ということになろうか。\n「まあ」と同様、「まあまあ」は相手を促したり、制止したりするときにも盛んに使われる。「まあ、ひどい！」と相手が怒った時、「まあまあ、そう怒らないで。」となだめる。相手の「まあ」は感嘆詞だが、それを制止する「まあまあ」のほうは副詞的用法となる。だが、その「まあまあ」も感嘆詞として使われるのだからなんともややこしい。",cn:"就这样，\"まあ\"被用于形形色色的场合，而且各用法之间有着微妙的意味深浅之别。更妙的是，把两个\"まあ\"叠在一起变成\"まあまあ\"之后，就成了一种根本无法严格辨析其含义的日语特有表达。有人问\"您身体好吗？\"，回一句\"嗯，まあまあ\"，意思是没什么特别毛病；说一句\"明天天气まあまあ吧\"，则表示虽然不会万里无云，但也不至于糟糕到下雨的地步。如果硬要译成英语，大概相当于 not bad（还不错）吧。\n与\"まあ\"一样，\"まあまあ\"在催促或劝止对方时也被大量使用。当对方怒气冲冲地说\"哎呀，太过分了！\"时，便用\"好了好了，别生气嘛\"来安抚。对方那个\"まあ\"是感叹词，而用来安抚的\"まあまあ\"则属于副词性用法。然而这个\"まあまあ\"同样也能当感叹词使，所以着实让人头疼。"},
{jp:"更に、「まあまあ」には、だいたい、という意味もある。「試験はどうだった？」ときかれて、「まあまあです」と言えば、だいたいできたということである。では、そのような場合のだいたいとはどの程度なのだろうか。国語辞典によれば、「かなりの程度」ということだが、それなら、かなりとはどのくらいなのか、と更に理詰めで追及されればっして明確には答えられない。あとは感じに頼るだけである。したがって、日本人の間で暗黙のうちに了解されているその程度をつかまない限り、このような表現は正確な情報を伝え得ないということになる。一体、その「程度」とは、どのくらいの程度なのか。",cn:"另外，\"まあまあ\"还包含\"大致\"\"差不多\"的意思。被问到\"考试考得怎么样？\"时回答\"まあまあ\"，就是在说大致还过得去。那么，这里的\"大致\"到底是个什么程度呢？查国语辞典，解释为\"相当的程度\"——可要是进一步追问\"相当\"究竟是多少，就再也给不出明确答案了，只能凭感觉意会。所以说，除非掌握了日本人之间心照不宣的那个\"度\"，否则这类表达根本无法传递准确的信息。这个\"程度\"，究竟是怎样的程度呢？"},
{jp:"いつごろ、だれが決めたのか分からないが、我が国に「日本三景」というのがある。日本の中で最も美しいと思われる三つの景勝地を選んだもので、周知のように宮城県の「松島」、京都府の「天ノ橋立」、そして広島県の「宮島」である。\nそれはともかく、この「三景」を思い浮かべてみると、そこに共通した性格があることに気づく。第一に、いずれも海辺の景色であるということだ。日本列島にはまるで背骨のように山脈が南から北まで走り、日本を日本海と太平洋側の二つに分けている。ほとんどが山といってもいいほどなのに、「三景」の中に一つも山の風景が入っていない。これは誠に奇妙なことではないか。\n第二に、その海岸の景色が皆穏やかな内海に臨むこぢんまりとした浜で、すぐ目の前に小さな島、あるいは州が見えるといった景観であることだ。逆に巻く波が打ち寄せる雄大な海岸線は全く見捨てられている。海といっても男性的な荒海ではなく、女性的な優しい入り江に日本人は心引かれるのである。",cn:"不知是什么年代、由谁定下来的，我国有个说法叫\"日本三景\"——就是从全国选出的三处最美的景胜之地。众所周知，它们分别是宫城县的松岛、京都府的天桥立，以及广岛县的宫岛。\n且不说这些，只要在脑海中浮现一下这\"三景\"，便能发现它们有一个共同的特征。第一，全都是海边的风景。日本列岛上山脉犹如脊梁骨一般从南贯穿到北，将国土一分为二。明明几乎遍地是山，\"三景\"之中却没有一处山岳风光入选，这难道不奇怪吗？\n第二，这些海岸景致无一例外都是面朝平静内海的小巧沙滩，眼前就能望见小小的岛屿或沙洲。至于巨浪翻卷的壮阔海岸线，则完全不在日本人的审美视野之内。日本人心之所系的，不是阳刚粗犷的大海，而是温柔宁静的小小入江。"},
{jp:"なぜなのであろうか。おそらくは日本民族が体験した太古の記憶が無意識のうちにこのような景色をこのうえなく美しく、懐かしい思いに誘うに違いない。日本人はその昔、南太平洋の島々、あるいは東南アジア、中国の江南地方、朝鮮半島などからさまざまなコースを経て日本列島にやってきた。原始的な小舟を操ってのその航海は、実に恐ろしい体験だったに違いない。大洋を漂流する彼らが、ただひたすら求め続けたのは島影だった。そして波を避け島に上陸することのできる入り江だったはずである。",cn:"这是为什么呢？我想，大概是日本民族在太古时代的体验，作为一种无意识的记忆，将这类景色与无上的美和深切的乡愁联系在了一起吧。远古的日本人，从南太平洋的岛屿、东南亚、中国的江南、朝鲜半岛等地，循着各种各样的路线来到了日本列岛。驾着简陋的小舟漂洋过海，那一定是极其恐怖的经历。不知有多少人为此丧命。在大洋上漂泊的他们，唯一苦苦追寻的就是远方的岛影；而能够避开风浪、安全登陆的入江，想必是他们最渴望抵达的地方。"},
{jp:"荒海を乗り切ってこの列島にたどり着いた日本人、そして海に取り巻かれながら生活を重ねてきた日本民族、当然日本人は海洋民族になってしかるべきである。ところが、わたしたちは海洋民族にはならなかった。なぜなら、日本人は二度と再び恐ろしい海へ乗り出そうとはしなかったからである。そんな訳で山崎正和氏は日本人を海洋民族ならぬ海岸民族だと評している。まさしくそのとおりだと思う。\nでは、なぜそうだったのか、日本という島があまりに住み心地よかったからではあるまいか。温暖で湿潤な気候、変化に富んだ山河、外敵侵入のおそれのない安全な島国、こんな快適な国土に住み着いたのに、どうして今更海へ出ていくことがあろう。こうして日本人は太古の記憶を甘美な思い出として胸に抱きながら、それ以上を望まなかったのである。「日本三景」はこのような日本人の気質をなによりも正直に語っているのだ。",cn:"历经惊涛骇浪来到这片列岛的日本人，世世代代被大海环绕、繁衍生息，按理说应当成为一个海洋民族。然而事实上，我们并没有走上那条路。因为日本人再也不愿踏上那令人胆寒的大海了。正因如此，山崎正和先生才把日本人评价为\"非海洋民族，而是海岸民族\"。我深以为然。\n为什么会这样呢？恐怕是因为日本这座岛屿实在太宜居了。温暖湿润的气候、千变万化的山水、没有外敌入侵之虞的安全岛国——既然已身处如此舒适的国土，又何必再冒险出海呢？就这样，日本人把太古的记忆化为甜美的怀念珍藏于心，不再奢望更多。\"日本三景\"所传达的，正是日本人这种气质的最真实写照。"},
{jp:"とはいえ、この小さな島に住み着いた人たちがなんの争いもなく平穏に暮らせたというわけではけっしてない。この島国の中で、日本人は幾多の戦乱を経験してきた。だが、いくら争ってみても、周りが海なのであるから逃げ出す訳にはいかない。最終的にはなんらかの形で敵と妥協し、共存する道を探らねばならなかった。必要なことは、「分に安んじる」ことであり、それによって「和」を保つことだった。一定の限度を守るということは、それ以上を望まぬということである。己を抑制することである。\nそんな訳で日本人は、自分をやたらに主張してはいけない、そして、物事をあからさまにすべきではない、と考えるようになった。そう、日本人は本質的に争いを好まず、自然の運行のようにすべてがうまくいくのを期待し、確信している極めて楽観的な、そして同時に悲観的な民族なのである。その楽観が、実は悲観の上に成り立っているからである。",cn:"话虽如此，住在这座小岛上的人们也并非一直相安无事。在这个岛国之中，日本人经历了数不清的战乱。可是再怎么争斗，四面环海，无处可逃。到头来只能以某种方式与对手妥协，寻找共存之道。最要紧的是\"安分守己\"，并借此维护\"和\"。所谓遵守限度，便意味着不过分索求，克制自身的欲望。\n于是，日本人渐渐形成了一种信念：不应过于张扬自我，也不应把事情摊在明面上说。是的，日本人骨子里厌恶争斗，期待一切能像自然运转那样顺畅——这是一个极其乐观、同时又极其悲观的民族。之所以说乐观建立在悲观之上，是因为日本人的判断根植于一个前提：世间的事，绝不会如自己所想的那般顺遂。"},
{jp:"かつてわたしは将棋の大山名人にきいたことがある。将棋の対局で、しばしば二時間に及ぶほどの「長考」がなされることがある。一体、どういう局面でそのような「長考」をするんですか。\nすると大山名人は言下に、「あまりにもうまくいきすぎているときです。」と答えた。\n大山名人の返事はこうであった。「だいたい、物事はそんなにうまくいくわけがないからですよ。それなのに妙にうまくいきすぎるというのは、どこかに落とし穴があるからです。それに欺かれないために、うんと考え込むんですね。」\nわたしはえらく感心した。さすが一芸にひいでた名人の言葉である。これは将棋に限らず人生全般についていえることではないか。わたしはこうした確信こそ、紛れもなく日本的な信条であることに気づいたのだった。",cn:"我曾问过将棋名人大山先生一个问题。将棋对弈中，时常出现长达两个小时的\"长考\"。究竟是在怎样的局面下，棋手才会陷入如此漫长的思索呢？\n大山名人不假思索地回答：\"在一切进展得太顺利的时候。\"\n这个答案完全出乎我的意料。大山名人是这样解释的：\"一般来说，事情不可能那么一帆风顺。越是顺得不自然，就越说明某处暗藏着陷阱。为了不被蒙骗，就必须反复深思。\"\n我深为折服。不愧是在棋道上登峰造极的大师之言。这番话何止适用于棋局，简直是放之人生而皆准。这样想着，我恍然意识到，这种确信本身，恰恰就是一种地地道道的日本式信条。"},
{jp:"どんな人間も常に世界にある期待を持って対している。どれほど世界に期待するか、その期待の大きさで人々の世界観は違ってくる。実際以上の期待を抱くか、実際に見合った期待を寄せるか、それとも実際以下に期待を抑制するか、それによって理想主義、現実主義、悲観主義が分かれるのである。日本人は後者を選ぶのである。期待するところを少なくすれば、苦痛はそれだけ軽減される。すべてに一応満足していられる。これが日本人の基本的な精神の構えである。そして、これをみごとに言い当てているのが、ほかならぬ「まあまあ」という日本語のあいまいな副詞なのだ。\n「まあまあ」という言葉は、前記のように実に多様に使われているが、その本質は抑制にある。これらはいずれも、自分が実際以下に設定した期待をそのまま言い表している。期待は常に大きくなりがちである。ともすれば肥大してゆく期待に対して、日本人は折にふれてはそれを抑制する。「人生とは、まあまあ、そんなもんだよ。」と再認識することによって。したがって、「まあまあ」はアメリカふうに言うならば、take it easy！ということになろう。\n日本人に愛好される俳人一茶は、死を前にして、こんな句を残した。\n是がまあつひの栖か雪五尺",cn:"任何人在面对世界时，都怀揣着某种期待。期待的大小不同，人的世界观也随之不同。期待高于现实，便是理想主义；期待等于现实，便是现实主义；期待低于现实，便是悲观主义。日本人选择的是最后一种。把期待放低，痛苦便会相应减少，对一切便能大致感到满足。这便是日本人最根本的精神姿态。而将这一点概括得淋漓尽致的，正是\"まあまあ\"这个暧昧的日语副词。\n\"まあまあ\"一词虽然用法多样，但其本质在于克制。\"好了好了，别生气。\"\"嘛嘛，挺好的嘛。\"\"嘛嘛，人生就是这么回事。\"——这些说法，无一不是在坦然表达一种将期待压低在现实以下的心态。期待总是不知不觉间膨胀，而日本人则时时刻刻加以抑制，通过\"人生嘛，不就那么回事\"这样的自我提醒，重新获得一份姑且的满足。所以用美国人的话来说，\"まあまあ\"大约就是 take it easy！\n深受日本人喜爱的俳人一茶，在临终前留下了这样一首俳句：\n这便是了 最终的栖所 雪深五尺"}
]},
{id:2,num:"第2課",title:"自然との出会い",author:"北村昌美 / 水上勉",sections:[
{subtitle:"ブナ林の四季",jp:"雪国の春はブナ林の芽吹きから始まると言ってよい。もちろん細かく見ればブナの緑に先駆けてマルバマンサクが咲き、タムシバ（ニオイコブシ）が咲く。しかし人の心にしみじみと春の喜びを感じさせてくれるのは、このブナの芽吹きであろう。まだ風も冷たく、根雪が林地に残っているうちに、ブナの新緑はうっすらと稜線を染める。あるかなきかのこの新緑に、長く厳しい冬に耐えてきた雪国の人は心のときめきをおさえることができない。しかし、まだはっきりと春が訪れたわけではないから、このときめきをあからさまにするのはもう少し待とう、そういった心境だと言えばいいだろうか。この時こそが雪国に暮らす人々にとって最高に幸せな時なのである。",cn:"可以说，雪国的春天是从山毛榉林的萌芽开始的。当然，若仔细观察，在山毛榉泛绿之前，圆叶满作和辛夷就已经开花了。然而，真正让人从心底深处感到春天喜悦的，还是山毛榉的新绿。寒风尚未褪去，残雪仍覆于林间大地，山毛榉的新绿便已若有若无地染上了远处的山脊。面对这淡得几乎看不见的嫩绿，忍耐了漫长严冬的雪国人，按捺不住内心的悸动。可春天毕竟还没有真正降临，这份欣喜还不到尽情表露的时候——若要形容这种心境，大概就是这样吧。而这一刻，恰恰是雪国人最幸福的时光。"},
{jp:"やがて、だれの目にも明らかに新緑は稜線を染めながら登り、全山を緑で覆っていく。そのころには林内の根雪もほとんど消えて、つつじ類をはじめ、低木類が林床を飾るのである。しかし、いつもながらの春の訪れとは言いながら、どうしてこうも順序を間違えず、次から次へと植物たちは動き出すのであろうか。その移り変わりは、あたかも生きものたちの成長の姿そのもののようである。天の摂理とは、まさにこのようなことを言うのではなかろうか。",cn:"不久，新绿便以谁都无法忽视的姿态，沿着山脊线向上攀升，将整座山披上一层翠色。这时林中的残雪也几乎消融殆尽，杜鹃等灌木纷纷装点起林间的地面。话虽说是每年一如既往的春天，可为什么植物们竟能如此不差分毫地按照顺序依次苏醒呢？那交替变换的过程，宛如生灵成长的姿态本身。所谓天道之理，大概说的就是这样的事吧。"},
{jp:"いかなる存在にも凋落の時が来ることを、自然はその長い年月の移ろいの中でも、また一年という短い間にも示してくれる。やがてブナの葉は落ちつくし、樹木全体が冬に備えた厳しい表情に変わっていく。そのたたずまいといい、また風雪に耐えるけなげな姿といい、ブナ林が真の迫力を見せるのに、冬に勝る季節はないであろう。ある人はそれこそ美の極致と評価するかもしれない。黒々と静まり返った冬のブナ林の中では、もうすでに何かが動き始めている。巡り来る春に、再び山を覆いつくすブナの葉が、早くも必要な枚数だけ冬芽の中に準備されているのである。ここでもまた、わたしたちは自然の偉大さに驚かずにはいられない。",cn:"任何存在都终有凋零之时——自然不仅在悠远的岁月更替中，也在短短一年的四季轮回中，默默展示着这一法则。山毛榉的叶片落尽之后，整棵树便换上一副迎战严冬的肃穆面孔。无论是那庄重的身姿，还是顶风冒雪的坚毅之态，能让山毛榉林展现出真正魄力的，非冬天莫属。或许有人会赞叹：那才是美的极致。在沉寂漆黑的冬日山毛榉林中，某些东西已经悄然启动了。为迎接即将到来的春天，覆盖满山所需的叶片早已在冬芽中准备就绪。面对这一切，我们不由得再次为自然的伟大而惊叹。"},
{jp:"ブナ林という自然界の片隅の、しかもその移り変わりの一断面をのぞいてみただけでも、自然は、いかに多彩で奥行きが深いものであるかを知ることができる。その奥深さが実感できるのは、そこに人間がかかわっているからにほかならない。確かに日本人は自然に極めて強い愛着を抱いている。また自然に対して研ぎすまされた感性を持っているのも事実である。しかし、それはあくまでも抽象的な、観念的な自然でしかないのではなかろうか。わたしたちはもっと現実の自然との一体感を取り戻さなければならない。自然を人間から切り離して眺めるのではなく、むしろ自然を友とし、自然の心に迫ることが大切なのである。\n何はおいても、まず山へ行き、森を散策し、自然界の生の鼓動に耳をかたむけよう。",cn:"仅仅从山毛榉林这一自然界的小小角落，管窥其季节更迭的一个断面，就能领略到自然是何等丰富多彩、何等深不可测。之所以能切身体会到那份深邃，恰恰是因为有人的参与。不错，日本人确实对自然怀有极为深厚的眷恋，也确实拥有对自然异常敏锐的感受力。然而，那终究不过是抽象的、观念化的自然罢了。我们必须重新找回与真实自然之间的一体感。不是把自然从人的世界中剥离出来远远观望，而是以自然为友、走近自然的内心——这才是最重要的。\n无论如何，先到山里去吧，漫步于森林之中，倾听自然界鲜活的心跳。"},
{subtitle:"竹とともに",jp:"竹を切って煮て、臼でついて、柔らかい餅にして、紙に漉いたり、人形面にしたりして二十年たつ。何もかも竹で作った人形で物語を舞わせてみようとの魂胆からだが、やっているうちに、ものも言わぬ竹ながら、何やかや教わるものが多い。\n若狭あたりでは、ほとんどの家は適当な藪を持っていて、筍を食うことから始め、何やかや生活用具に、手近なのは箸から、火吹き竹、洗い物かご、桑負い、野菜負い、うなぎ捕りのかごに至るまで、竹を使って親しんできた。だが今はほとんど村から竹細工師は消えた。竹が泣いている。",cn:"把竹子劈开、煮过、用臼舂烂，做成柔软的浆，再抄成纸、制成人偶的面具——转眼已有二十年。最初不过是想用竹子做的人偶来演绎故事，可做着做着，虽然竹子不会开口说话，却教会了我许多东西。\n在若狭一带，家家户户差不多都有一片竹林。从吃笋开始，到各式各样的日常器具——最顺手的是筷子，还有吹火竹、洗菜篮、背筐、捕鳗笼……竹子与人的生活亲密无间。可如今，竹匠几乎从村子里绝迹了。竹子在哭泣。"},
{jp:"子供のころの記憶だけれど、僕の生家は藪に囲まれた村はずれだったので、夕暮れの鐘がよそより細く届いた。竹は空洞に音をためて生きるのだそうだ。それゆえ、藪に囲まれていると、自然の防音装置になり、シンと閑寂なのである。尺八の音色が美しいのは、生まれてずうっとためた音を、人の息に誘われて引き出すからだ、と言った人がいた。\n「松のことは松に習へ、竹のことは竹に習へ。」と言ったのは昔の俳聖である。僕は、このごろ自然というものは、やっぱり頑固に守らないと、歴史が崩れるような気がする。身近の作業の日常が、そんな思いにさせるのである。",cn:"虽然只是儿时的记忆，我出生的老宅坐落在村子的边缘，四周环绕着竹丛，所以傍晚的钟声传到这里时，总比别处细弱几分。据说竹子天生在中空的腔体里蓄积着声音。因此，被竹丛围绕之处便如同天然的隔音屏障，显得格外清寂。曾有人说，尺八的音色之所以美妙动人，是因为它奏出的，是竹子从出生起便一直蓄积在体内的声音，被人的气息唤了出来。\n\"松之事当问松，竹之事当问竹。\"说这话的，是昔日的俳圣。最近我越来越觉得，自然这种东西，如果不执拗地加以守护，连历史都会随之崩塌。正是身边日复一日与竹相伴的劳作，让我萌生了这样的感触。"}
]},
{id:3,num:"第3課",title:"水の東西",author:"山崎正和",sections:[
{subtitle:"水の東西",jp:"「鹿おどし」が動いているのを見ると、その愛嬌の中に、なんとなく人生のけだるさのようなものを感じることがある。かわいらしい竹のシーソーの一端に水受けがついていて、それに筧の水が少しずつたまる。静かに緊張が高まりながら、やがて水受けがいっぱいになると、シーソーはぐらりと傾いて水をこぼす。緊張が一気に解けて水受けが跳ね上がると、竹が石をたたいて、こおんと、くぐもった優しい音をたてるのである。\n見ていると、単純な、ゆるやかなリズムが、無限にいつまでも繰り返される。緊張が高まり、それが一気にほどけ、しかし何事も起こらない徒労がまた一から始められる。ただ、曇った音響が時を刻んで、庭の静寂と時間の長さをいやがうえにも引き立てるだけである。「鹿おどし」は我々に流れるものを感じさせる。それをせき止め、刻むことによって、この仕掛けはかえって流れてやまないものの存在を強調しているといえる。",cn:"看着\"鹿威\"一下一下地动着，在那份玲珑可爱中，不知怎的会隐隐感到一种人生的慵倦。小巧的竹制跷跷板一端装着水斗，筧中的清水一滴一滴地蓄积。紧张感无声地攀升，终于，水斗注满，跷跷板猛然倾斜，\"哗\"的一下倾泻而出。紧绷的张力瞬间消解，水斗弹起，竹管敲上石头，发出一声\"咚——\"沉闷而温柔的回响。\n看着它，简单、舒缓的节奏无穷无尽地重复着。紧张积聚，一下子释放，然而什么也不曾发生——这徒劳般的过程又从头来过。唯有那浑浊的声响一下下标刻着时间，将庭院的寂静与时间的绵长愈发衬托得淋漓尽致。\"鹿威\"让我们感受到的，是某种流动不息的存在。通过截断它、刻度它，这个装置反倒强调了那永不停歇的流淌。"},
{jp:"私はこの「鹿おどし」を、ニューヨークの大きな銀行の待合室で見たことがある。だが、ニューヨークの銀行では人々はあまりに忙しすぎて、一つの音と次の音との長い間隔を聞くゆとりはなさそうであった。それよりも窓の外に噴き上げる華やかな噴水のほうが、ここでは水の芸術として明らかに人々の気持ちをくつろがせていた。\n流れる水と、噴き上げる水。\nそういえばヨーロッパでもアメリカでも、町の広場にはいたるところにみごとな噴水があった。有名なローマ郊外のエステ家の別荘など、何百という噴水の群れが庭をぎっしりと埋め尽くしていた。樹木も草花もここでは添えものにすぎず、壮大な水の造型がどろきながら林立しているのに私は息をのんだ。それは揺れ動くバロック彫刻さながらであり、ほとばしるというよりは、音をたてて空間に静止しているように見えた。\n時間的な水、空間的な水。",cn:"我曾在纽约一家大银行的候客室里见过\"鹿威\"。不过在纽约的银行，人们实在太忙碌了，恐怕没有余裕去品味前一声与后一声之间那漫长的间歇。比起\"鹿威\"，窗外华丽喷涌的喷泉作为水的艺术，在这里显然更能令人心旷神怡。\n流淌的水，与喷涌的水。\n说起来，无论在欧洲还是美洲，城镇广场上到处都矗立着精美的喷泉。最出名的莫过于罗马郊外埃斯特别墅——数以百计的喷泉密密匝匝地填满了整座庭园。树木花草在这里反倒成了点缀，壮观的水之造型巍然林立，令我叹为观止。那景象仿佛摇曳生姿的巴洛克雕塑，与其说在迸溅，不如说在发出轰鸣声凝固于空间之中。\n时间性的水，与空间性的水。"},
{jp:"そういうことをふと考えさせるほど、日本の伝統の中に噴水というものは少ない。せせらぎを作り、滝をかけ、池を掘って水を見ることはあれほど好んだ日本人が、噴水の美だけは近代に至るまで忘れていた。日本人にとって水は自然に流れる姿が美しいのであり、圧縮したりねじ曲げたり、粘土のように造型する対象ではなかったのであろう。\nいうまでもなく、水にはそれ自体として定まった形がない。そして、形がないということについて、おそらく日本人は西洋人と違った独特の好みを持っていたのである。それは外界に対する受動的な態度というよりは、積極的に、形なきものを恐れない心の現れではなかったろうか。\n見えない水と、目に見える水。\nもし、流れを感じることだけが大切なのだとしたら、我々は水を実感するのに、もはや水を見る必要さえないといえる。そう考えればあの「鹿おどし」は、日本人が水を鑑賞する行為の極致を表す仕掛けだといえるかもしれない。",cn:"细想之下，日本的传统中，喷泉实在少得出奇。明明那么喜欢引溪造瀑、掘池赏水，日本人却唯独将喷泉之美遗忘到了近代。对日本人而言，水以自然流淌的姿态呈现才是美的，它不是可以压缩、扭曲、像黏土一样任意塑形的对象。\n不言而喻，水本身并没有固定的形状。而对于\"无形\"这件事，日本人大概怀有一种与西方人截然不同的独特偏好。那与其说是面对外界的消极态度，不如说是一种积极的心性——不畏惧没有形状的事物。\n看不见的水，与看得见的水。\n如果说，仅仅感受到水的流动就已经足够的话，那我们甚至不需要用眼睛去看水，便能真切地体验到它的存在。这样想来，那个\"鹿威\"，说不定正是日本人鉴赏水这一行为所能达到的极致装置。"},
{subtitle:"文化論の落とし穴",jp:"ひと昔前、眼鏡をかけカメラを肩にして、猫背の観光客を見たら日本人だと思え、という浅薄な冗談がはやったことがあった。こうしたレッテルは、確かにある程度、日本人の現実を言い当てているものの、たいていは事実の一面が誇張されているのは、言うまでもない。しかも困ったことに、そうした事実が変わったのちにも、イメージは一つの固定観念として、ひとり歩きをすることが多い。どうやら、人間にはだれしも他国の文化や他民族の民族性について、安易な固定観念を抱いて安心する癖があるらしい。",cn:"大约十多年前，曾流行过一个浅薄的笑话：看到戴着眼镜、肩挎相机、弓腰驼背的游客，准是日本人。这类标签诚然在一定程度上切中了日本人的某些特征，但显而易见，大多是把事实的某一面加以夸大而已。更麻烦的是，即便实际情况早已改变，这些刻板印象依然会作为固定观念自行其是、顽固流传。看来人类天性中就有这么一种倾向：对他国文化和异族特性抱一套简单粗暴的成见，然后便心安理得了。"},
{jp:"それにしても、とりわけ日本人については、近年に至って、この文化論的なレッテル張りがいささか危険な域に達しているように見える。だが、実はそれ以上に不幸なことは、これに対応して日本人の側にも、自分たちの文化にある固定観念の枠をはめて、それを変え難いものとするかたくなな態度が芽生えてきたことである。\n考えてみると、我々は自分をあるしかたで認識するが、実は、その自己認識がまた自己の実体を作るという側面を持っている。文化論というのは、決して単なる事実の認識であるだけではなくて、実は行動の規範であり、またひと回りして認識の枠組みにもなるという、恐ろしい事実を見つめておかなければならないだろう。文化および民族性のイメージを考えるにつけては、我々は特別に慎重であり、焦点の選び方に注意深くあらねばならないはずである。",cn:"尤其令人担忧的是，近年来，针对日本人的这种文化论式的贴标签行为，似乎已达到了某种危险的程度。然而比这更为不幸的是，作为一种回应，日本人自身也渐渐生出了一种固执的态度——主动给自己的文化套上固定观念的框架，并将其视为不可更改的定论。\n细想一下就会明白：我们虽然以某种方式认识自我，但事实上，这种自我认识反过来又在塑造着自我本身。必须正视的一个可怕事实是：文化论绝非仅仅是对事实的描述，它同时也是行为的准则，转一圈回来又会成为认知的框架。因此，在审视文化和民族性的形象时，我们必须格外谨慎，在切入点的选择上必须万分小心。"}
]},
{id:6,num:"第6課",title:"いのち",author:"阿部昭",sections:[
{jp:"わたしのところには、目下、三匹の猫がいるが、近ごろの子供は現実的だから、「猫はいったい何の役に立つの？」などと父親に尋ねる。私としては返答に窮する。\nなるほど、そう言われれば、犬は泥棒の番をするとか、投げたボールを拾ってくるとか、多少とも人間の用事をする。が、猫ときたら！このごろはねずみも出ないようだから、食べて、寝て、出歩いて、お腹がすくと帰ってきて、また食べて寝る、というだけで、人間にはなんにも奉仕しない。\n「全然何の役にも立たないところがいいじゃないか。そこにいるだけでおもしろいんだから。」とでも答えておくしかないが、これでは子供への解答にならるまい。",cn:"我家眼下养了三只猫。如今的孩子都很现实，会这样问父亲：\"猫到底有什么用？\"说实话，我答不上来。\n细想也是，狗好歹还能看家防贼、捡个球什么的，多少算为人做了点事。可猫呢？如今连老鼠都不怎么出没了，它们不过就是吃了睡、睡了溜达一圈，饿了回来再吃再睡——对人类毫无贡献可言。\n只能这样敷衍一句：\"正因为什么用都没有才好嘛，光是待在那儿就觉得有趣。\"不过这恐怕算不上一个令孩子信服的答案。"},
{jp:"それはともかく、動物の行動を見ているだけでも、私には楽しい。彼らが、松やいぬアカシヤの幹を、垂直に、一気に、何メートルも駆け上ったり、飛んでいる虫を捕ろうと宙高く躍り上がったりするのを見るたびに、動物ってなんと無駄のない正確な運動をするんだろう、今さらのように感嘆するのだ。\n畜生のあさましさ、などという言葉が人間にはあるが、そうとばかりは言えない。人間の母親でさえ、子供を生むこと育てることをいとい、捨てたり死なせたりする世の中なのに、猫の育児は細心の情愛と無限の忍耐そのものである。",cn:"撇开这些不谈，光是看动物的举动，我就觉得乐趣无穷。每当看到它们沿着松树或刺槐的树干笔直地、一口气地冲上好几米高，或者为了扑捉飞虫纵身一跃、腾空而起，我都会感叹：动物的运动竟如此精准而毫无浪费！尽管已是司空见惯的场景，却仍然每次都为之惊叹。\n人类有句话叫\"畜生的卑鄙\"，可事情并不总是如此。在这个连人类的母亲都会嫌弃生养而抛弃或害死孩子的世道里，猫的育儿却是无微不至的慈爱与无尽耐心的化身。"},
{jp:"猫が増えてから、家の中のあちこちに、とかげをはじめ、かげろう、ばった、かまきり、はち、かなぶん、蝶、蛾、こおろぎ、時にはおけらのようなものまで、小動物の死骸がちらばるようになった。\n海辺の暖かい草地には、とかげがたくさんいるらしい。猫の手にかかったとかげは、たいていしっぽがちぎれている。これは、猫は食べるのではなく、長い時間をかけておもちゃにするのである。遊び飽きると、その場にほったらかしにして、もう顧みもしない。\n運よく命拾いをして、からがらはい出したとかげもいるにはちがいないが、多くは逃げるに逃げられず、家具の後ろや敷き物の下で干物みたいにからからになっている。",cn:"自从猫多了以后，家里各个角落便散落着蜥蜴、蜉蝣、蚱蜢、螳螂、蜜蜂、金龟子、蝴蝶、飞蛾、蟋蟀，有时甚至还有蝼蛄之类小动物的尸骸。\n海边温暖的草地上，蜥蜴似乎很多。落入猫掌的蜥蜴，尾巴多半已经断了。猫并不是为了吃它们，而是花上很长时间把它们当玩具耍弄。玩腻了就随手一扔，再也不闻不问。\n当然也有侥幸逃出生天、连滚带爬溜走的蜥蜴，但更多的是逃不掉的，在家具背后或垫子底下干成了标本一样硬邦邦的薄片。"},
{jp:"ところで、ついこの間、よく晴れた日の午後、自分の部屋で仕事をしていると、すぐ横の草むらで、キ、キ、キ、キ、キ……という何者かの鋭い悲鳴がした。\n見ると、子猫が——といっても身体つきはもう大人の猫並みなのだが——何か獲物を追いつめている。\n私は縁側から出ていった。地面すれすれにはった松の枝と下生えの雑草との間に、押し込められたような格好で、一羽のセキセイインコがもがいていた。\n私が鳥を助けてやろうと手を伸ばす、それよりも早く、猫はうなり声とともにインコをくわえて、茂みのもっと深いところへ逃げ込んだ。",cn:"就在不久前一个晴朗的午后，我正在自己房间里工作，忽然听到紧挨着的草丛里传来\"吱、吱、吱、吱、吱……\"一阵尖厉的惨叫。\n定睛一看，一只小猫——虽说身量已经跟成年猫差不多了——正在追逼某个猎物。\n我从走廊走了出去。在贴着地面蔓延的松枝和杂草丛之间，一只虎皮鹦鹉被夹在其中，拼命挣扎。\n我伸手去救鸟，然而比我更快一步的是猫——它发出一声低吼，一口叼起鹦鹉，钻进了更深的灌木丛。"},
{jp:"それでも、私はもう一度外へ出ていき、庭じゅう猫を追い回して、ついに彼の口からインコをもぎ取ることに成功した。インコは、翼の付け根の、人間で言えばわきの下にかなりひどい傷を受けていたが、まだ元気のように見えた。\nそれが証拠には、彼女はいきなり私の指のまたにかみついたほどである。しかも、なんという渾身の力をこめてかんだものであろう！\nインコは、しばらくは私の部屋の畳の上に横倒しになっていたが、やがて起き上がれるようになった。私は、これなら籠を用意して飼ってやってもいい、という気持ちになっていた。\nしかし、やはり猫から取り上げるのが遅すぎたのだろう、二、三時間後に見ると、また横倒しになって、すっかり冷たくなっていた。",cn:"尽管如此，我还是再次走出去，满院子追着猫跑，终于从它嘴里夺下了鹦鹉。鹦鹉的翅膀根部——相当于人类腋下的位置——受了很重的伤，但看上去还算有精神。\n何以见得呢？因为她二话不说就狠狠咬住了我的指缝。而且，那一口使上了多大的劲啊！\n鹦鹉在我房间的榻榻米上横躺了一阵，渐渐又能站起来了。我心想，这样的话准备个笼子养起来也好。\n然而终究还是从猫嘴里抢回来得太迟了吧，两三个小时后再看，它又横倒在地，已经彻底凉了。"},
{jp:"とはいえ、人間はやはり人間のことで精一杯だ。動物のことまで考えてやる余裕はなかなかない。飼ってやるだけの情けは持ち合わせながら、一方では、心ならずも冷血漢たるの不名誉に甘んじている。\n一日鎖でつながれて、垣根の隙間からしょんぼり往来を見ている飼い犬たち。\n打ち捨てられて、雨の中でいつまでもきりなく鳴いている子猫たち。\n空を飛ぶことも忘れたまま、籠の中で冷たくなっていく小鳥たち。\nもの言わぬ彼らの不幸は、なんと我々人間の不幸に似ていることか、空恐ろしいまでに！",cn:"话虽如此，人终归还是被自己的事忙得焦头烂额，实在没有多少余力去顾及动物。明明怀着一份饲养它们的怜悯之心，另一方面却又不由自主地甘当\"冷血之人\"的不光彩角色。\n被铁链拴了一整天，从篱笆缝里怏怏地望着行人来去的家犬。\n被遗弃在雨中，永无休止地哀叫着的小猫。\n连飞翔都已忘却，在笼中渐渐冰冷下去的小鸟。\n不会言语的它们的不幸，与我们人类的不幸何其相似——相似得令人不寒而栗！"}
]},
{id:7,num:"第7課",title:"文章について",author:"芳賀綏",sections:[
{jp:"文章を書くことは苦しい。しかしまた楽しい。書きたいテーマは脳中にあって早く文字化されることを待っている。\nしかし、ひるがえって思うに、文章を書くことは恐ろしい。書くなどということは、恐るべく、慎むべきことである。\n人は、自分の持っているものを文章化する。それによって他人を益することもあれば、世に刺激を与え、問題を投ずることもできよう。けれども、人が「持っている」ものはたかが知れている。「持っていない」もののほうがはるかに多いのだ。",cn:"写文章是一件苦差事，但同时也是一件快事。想写的主题在脑中蓄势待发，等着被化为文字。\n然而转念一想，写文章又是一件可怕的事。动笔这件事，是应当敬畏、应当慎之又慎的。\n人把自己拥有的东西化为文章，或许由此能使他人受益，也或许能给世间投下一些刺激和问题。但归根结底，一个人\"拥有\"的东西终究有限，\"不拥有\"的东西才是压倒性地多。"},
{jp:"知識、思想、表現力、人格的感化力——どれをとってみても、各人の持っているものは知れている。書くことは、おのれの足らざるところを人に示す行為である。内にあふれるものが行間に読み取れることもある代わりに、内に何が欠けているかが見えすいて、読者の気持ちを寒々とさせることもある。\n足らざるを露呈するだけではない。思いの内容を過不足なく言葉に表すこと、これがまた容易ではない。事実関係の再構成に手間どる、どこかにすき間が残る。それを文字化する、またすき間がある。言葉足らざるもどかしさは、いつまでも尾を引いて心が平らかでない。",cn:"知识、思想、表现力、人格的感召力——无论哪一项，每个人所拥有的都不过尔尔。写作，本质上是一种将自身不足之处暴露于人前的行为。行间或许能读出内在的充盈，但同样也可能让人一眼看穿你内里缺了什么，令读者感到一阵寒意。\n暴露不足还只是一方面。要把心中所想恰如其分地用语言表达出来，这同样谈何容易。重构事实关系就已颇费周章，总难免留下缝隙；再将其转化为文字，又产生新的缝隙。词不达意的焦灼感挥之不去，久久难以释怀。"},
{jp:"けれども、また思うに、これは、表現すること、さらに人が生きることの背負っている宿命というものかもしれない。——人間は、自分の考えを他者に伝えたくて、言語という記号（シンボル）を創りだした。言語は記号であって、考えそのものではない。実際の考えと、言語によるその表現との間には、常に微妙なずれがある。\n賢者は黙して語らない。壁に向かって九年間も沈黙を続けた達磨大師の面壁九年は、差し詰め、その好例といっていい。黙っていれば、恥をかかずにすむ。\nそうは思っても、そういう考えをここにこうして書いて、新しい恥の種をまくのが、人間の、特に凡夫の業というものなのだ。人間の業は、言葉をもって自分を表現しないではいられないというところにある。",cn:"然而再想想，这也许就是\"表达\"这件事——甚至是\"活着\"这件事——所背负的宿命吧。人类因为想将自己的想法传递给他人，才创造出了语言这种符号。语言是符号，而非思想本身。实际的想法与语言的表达之间，始终横亘着一道微妙的落差。\n贤者沉默不语。面壁九年的达摩祖师，说起来正是这方面的典范。只要闭口不言，就不会出丑。\n话虽这么想，却还是忍不住把这些想法写在这里，播下新的出丑的种子——这便是人类的、尤其是凡夫俗子的业力所在。人的业力，就在于非要用语言来表达自我不可。"},
{jp:"これが文章を書くという行為の出発点だと私は考えている。その上に立って文章を実際に書いていくとき、私が心掛けていることが二つある。\nまず第一に、自分の持っている考えを、少しでも的確に表現しようということだ。そのためには、まず自分自身の考えをつきつめていくことが大切だ。自分でさえ「うまく言えないんだけれど」ということを、他人がどうして理解してくれるものか。\n第二に、他者に伝えるために表現しているという意識を忘れないことだ。表現というものは、それが相手に伝わってはじめて完結するものだ。「どんな人たちに」「何を」伝えたいのかということを意識することは、ものを書く場合、不可欠の条件だ。",cn:"我认为这便是写文章这一行为的出发点。在此基础上，实际动笔时，我会留意两件事。\n第一，尽可能准确地表达自己的想法。为此，首先要把自己的思路彻底想清楚、想透彻。连自己都觉得\"说不太清楚\"的东西，别人怎么可能理解？\n第二，时刻不忘\"表达是为了传达给他人\"这一意识。表达这种东西，唯有传递到了对方那里，才算真正完成。意识到自己想把\"什么\"传达给\"怎样的人\"——这是写作不可或缺的前提。"},
{jp:"「文章はレイアウトである。」——これが、私の文章観だ。文章をレイアウトする目的は、テーマ（主題）をはっきりと浮かび上がらせることにある。そして、言いたいことどもの比重や相互の関係を視覚化することにある。\n言ってみれば、文章とはドラマのようなものである。その主人公は、もちろん文章を書く自分自身だ。だが、ほかにもう一人相手役がいる。それは、その文章の読み手だ。\nそんなとき、セリフにはリズムが生まれる。文章にもまた、リズムがなくてはならない。短いセンテンスを積み重ねて、たたみかけていく呼吸。そして、長いセンテンスで、じっくりと説いていく呼吸。そんな長短の配合よろしきを得て、はじめて文章のリズムが生まれてくるものだ。",cn:"\"文章即排版。\"——这就是我的文章观。排版文章的目的，在于让主题鲜明地凸显出来，在于将想说的各项内容的轻重缓急和彼此的关联直观呈现。\n打个比方，文章就像一出戏剧。主角自然是写文章的自己，而另一个不可或缺的角色，则是读者。\n当对话展开时，台词便有了节奏。文章同样不能没有节奏。用短句层层叠加、步步紧逼的呼吸；用长句沉稳从容、娓娓道来的呼吸。唯有长短搭配得恰到好处，文章的节奏感才能应运而生。"}
]},
{id:8,num:"第8課",title:"企業内の聖人",author:"星新一",sections:[
{jp:"ある会社に、ひとりの男が入社してきた。社の関係者の口利きとかいう特殊なものでなく、入社試験に合格という平凡な結果によってだった。\n人のよさを絵に描いたような顔をしていた。採用かどうかをきめる試験委員たちは、みなその男にいい点をつけた。この男に限って、いかなる環境におかれようと決して悪事はやらないだろう、といった顔つきだったのだ。\nほかの入社志願者たちには、なんとなく抜け目のないさみたいなものがある。そういう連中のなかにまざっているので、その男がとくにそう思えたのかもしれない。\n入社したその男は、営業部に配属された。そして、集金の仕事を担当させられた。",cn:"某公司来了一个新人。他既不是靠公司内部关系走后门进来的，也没有什么特殊背景，仅仅是入社考试合格——一个再平凡不过的结果。\n此人的长相，活脱脱就是\"老好人\"三个字的具象化。负责决定录用与否的考官们无不给了他高分。这张脸似乎在说：这个人无论身处怎样的环境，都绝对不会做坏事。\n其他应聘者或多或少都透着一股精明劲儿。也许正因为混在那样一群人之中，他才显得格外突出吧。\n入职后，他被分配到营业部，负责催收货款。"},
{jp:"まもなく、男は一週間の出張を命じられた。集金のためいくつかの取引先をまわるのだが、そのなかに問題のある店が含まれていた。社員が出かけていっても、うまく丸め込まれ、わずかな集金で帰らざるをえないという、扱いにくい主人のいる店だ。\n男は元気よく出かけていった。上役は、期待と不安をもって見送った。一週間がたち、男は帰社して報告した。前任者たちがてこずっていた店から、売掛金のほとんどを回収してきたのだ。\n「これはすごい。前例のない手腕の主だな。よくやった。で、ほかの店は……」\n「いえ、今回はこれだけです。あとはつぎの出張のときに……」\nその返事の言葉に上役はとまどい、何回も聞きなおし、やっと事態を知り、肝を潰した。この男、一軒の集金に一週間を費やしたのだ。",cn:"不久，他接到了为期一周的出差任务——去几家客户那里收账。其中有一家出了名的难缠，公司派谁去都会被对方巧舌如簧地糊弄过去，最后只能带回一点零头。\n这个男人精神抖擞地出发了。上司怀着又期待又不安的心情目送他远去。一周后，他回到公司述职。那家让前任们焦头烂额的老大难客户，竟被他收回了几乎全部欠款。\n\"了不起啊！史无前例的手腕！干得好！对了，其他几家呢……\"\n\"那个……这次就去了这一家。剩下的打算下次出差时再……\"\n上司闻言一愣，反复追问，总算弄清了事情的原委，当场目瞪口呆：这位仁兄，一家店的账，竟然整整收了一个星期。"},
{jp:"つまり、その男の仕事ぶりは、それ以後もずっとそんな調子だったのだ。ひとつのことにとりかかると、それに心から没入してやりとげ、あとに好印象を残す。それはそれでいいことなのだが、給料分の働きになっていない。新入社員に対して「ほどほどにやればいいのだ」とも言えず、上役は頭を悩ました。\n考えたあげく上役は、その男に別な仕事をやらせることにした。\n「集金は別な者に代らせる。きみには新規の取引先開拓のほうを頼みたい」\n「はい。社のためであれば、どんなことでも喜んでやります。そのような重要な分野にまわしていただき、心の引き締まる思いです」",cn:"也就是说，从那以后，他的工作风格始终就是这个调调。一旦着手某件事，便全身心投入、务求完美，给对方留下极好的印象。这固然不是坏事，可问题在于产出远远对不起他那份工资。又不好对一个新人说\"差不多就行了\"，上司实在伤透了脑筋。\n思来想去，上司决定给他换个岗位。\n\"收账的事让别人接手。我想让你去开拓新客户。\"\n\"好的！只要是为公司效力，我做什么都心甘情愿。能被委以如此重任，深感责任重大！\""},
{jp:"彼は社の金を使っての飲食はしなかったが、会社の帰りには同僚とともにバーに入ることもあった。酒を飲みながら、会社や上役や同僚の礼賛をやるのだ。酔いというものは、一般に上役やその場にいないやつの陰口を誘発するものだが、その男はそれをしなかった。\n酔った時に人間の本性が現れるとすれば、その男の本性はまさに善といえるだろう。あまりに奇妙な酒癖なので、バーの女たちは珍しがり、いつのまにか社の連中にも伝わることとなった。\nとなると、彼への陰口はだれも言わなくなった。聖人のごとき人物をもなくけなすと、なにかたたりがありそうではないか。自分を持ち上げてくれるやつの足をひっぱるなど、いくらなんでもできない。",cn:"他从不用公款吃喝应酬，不过下班后偶尔也会和同事一起去泡泡酒吧。可他喝起酒来，满口说的全是公司好、上司好、同事好。一般来说，酒后最容易说人闲话、发上司牢骚，可这个男人从来不这样。\n如果说醉酒时会暴露人的本性，那么他的本性可以说就是纯粹的善。这种酒后行径实在太稀奇了，酒吧的女孩子们啧啧称奇，不知不觉就传到了公司同事的耳朵里。\n于是便没有人再说他的坏话了。连圣人一般的人物都要在背后中伤的话，怕是要遭报应吧。去拖一个总在夸自己的人的后腿，这种事再怎么也做不出来。"},
{jp:"しかし、冷静な判断でとなると、こんな困った人物もない。営利事業を構成する一員としての資格が、まるでないのだ。\n直接の上役はいらいらした。内心では「なあ、きみ。進むべき人生の道を誤ったんじゃないのか、もっとふさわしい職に移ったらどうだ」と辞職を勧告したいのだが、そうもできない。\nなんということなく、周囲ではひとつの結論に到達した。祭り上げ。それができれば、いちばんいいのだがなあ。すべて丸くおさまる。そんなムードが発生し、具体的な運動になったりもした。\nそして、それが実現した。彼はこう言い渡された。「きみは課長に昇進ときまった」\n「いえ、わたしはいまの地位でけっこうです。下積みで地味な仕事に励むのが好きなのです」",cn:"然而若以冷静的眼光来判断，再没有比这号人物更令人头疼的了。作为一个以盈利为目的的企业的成员，他简直毫无资格可言。\n直属上司急得团团转。心里恨不得说一句\"喂，你是不是走错了人生的路？换个更适合你的职业如何？\"但又实在开不了这个口。\n不知不觉中，周围的人达成了一个默契：把他架上去。如果能做到这一点，那就万事大吉了——一切便能圆满解决。这种氛围逐渐发酵，甚至发展成了具体的行动。\n最终，计划得以实现。他被通知：\"你已获提升为课长。\"\n\"不不不，我在现在的岗位上就很好。我喜欢在底层踏踏实实地干活。\""},
{jp:"このような経過で取締役になった例は、ほかになかったのではなかろうか。\nしかし、企業にとってはお荷物だ。冷酷なる人事部は、一計を案じた。おとり作戦を計画した。ある下請け会社にいいふくめ、彼にリベートを握らせようと仕組んだ。聖人を陥れる第一歩は、まず堕落させることだ。\nその作戦が展開されたのだが、何の収穫もあげられなかった。下請け会社の者は、人事部にやってきて、預かった金を返しながら報告した。「わたしの手には負えません。あんな立派な人物はいませんよ。筋の通らぬ金には、まったく手をつけようとはしません。」",cn:"以这种方式当上董事的案例，大概前所未有。\n不过对企业来说，他终究是个包袱。冷酷的人事部想出了一条毒计——诱饵作战。他们暗中授意一家外包公司，设法让他收下回扣，以此将这位\"圣人\"拉下水。要搞垮一个圣人，第一步就是先让他堕落。\n作战开始了，却颗粒无收。外包公司的人跑来人事部退还了那笔钱，如实汇报：\"这个人我实在搞不定。世上没见过这么正派的人，来路不正的钱他碰都不碰。\""},
{jp:"かくして、取込み詐欺の一件は解決となった。人事部一同、良心がうずき、深く反省した。\nそのムードの中で、また祭り上げ方式が採用された。昇進の形で、社史編集室長という閑職へ移された。\nしかし、部長にしようにも、彼に適当なポストがなかった。どの部も敬して遠ざける。必要は発明の母。新しい部がそのために作られた。企画調整部という。何もしなくていいという部なのだが、心の底からわきあがる愛社精神を押えられぬ彼は、じっとしていられない。例によって、熱心に何かやろうとするのだが、その結果は他人の邪魔になる。こうなると、いつもの手段、祭り上げをやるしかない。",cn:"就这样，那场诈骗未遂事件宣告收场。人事部全员良心不安，深深反省了一番。\n在那种气氛下，\"架上去\"的老办法再度被搬了出来。他以升职的名义被调到了社史编纂室主任这个闲差上。\n可要再往上提拔为部长，却找不到适合他的位子——各部门避之唯恐不及。需要是发明之母，于是专门为他新设了一个部门，叫\"企划调整部\"。虽说这个部门本来什么都不用干，可他那从心底涌上来的爱社之情根本压不住，照例满腔热情地想做点什么，结果却净给别人添乱。到最后，还是只能祭出那套老办法——继续往上架。"},
{jp:"このような経過で取締役になった例は、ほかになかったのではなかろうか。\nそして、ある日、彼は発作的に社長室の窓から飛びおりた。五階であり、もちろん地上に達するとともに死んだ。\n当人はそんな精神状態だったので、新聞も書類の内容も見ず、社員も報告していなかったので、社が危機にあったことも知らなかった。つまり、その社の製品の品質不良がもとで、社会に害が及ぶという創立以来の大不祥事。\n新聞がそれを取り上げかけていた。大衆の怒りがここに集中しようとしかけていた時だったが、その矢先に社長が自殺してしまったのだ。こぶしの振り上げようもない。\n各新聞社から記者がやってきて、だれかれとなく聞きまわった。だれもがほめ、けなす人はいなかった。社会的責任を一身にしょって、天下に罪を謝するための覚悟の自殺をした高潔な人物にみえる。非難しようにも、矛先がにぶる。\nしばらくの時がたち、社員たちはなにかというと思い出す。\n「この社を救うために、神がつかわされた救世主じゃなかったのかな、あの人。いや、正しくは救社主と呼ぶべきかな……」\n神なんか信じない連中なのだが、ふとそんなことをつぶやいたりする。",cn:"以这种经历当上董事的案例，大概前无古人。\n然后某一天，他突然从社长办公室的窗户纵身跃下。五楼，落地即亡。\n由于他当时的精神状态，既不看报纸也不看文件，员工们也没有向他汇报，所以他对公司正面临的危机一无所知。那是一桩创业以来从未有过的大丑闻——公司产品的质量问题已经危害到了社会。\n报纸正准备大肆报道，公众的怒火即将集中到这家公司头上。就在这节骨眼上，社长自杀了。拳头举了起来，却不知该往哪里砸。\n各报社的记者蜂拥而至，逢人便打听。众口一词全是赞扬，没有一个人说他的坏话。在外人看来，他分明是一位独自承担社会责任、以死向天下谢罪的高洁之士。想要批判，也觉得矛头钝了。\n时间过去了一阵子，员工们时不时会想起他。\n\"那个人，不会是上天派来拯救这家公司的救世主吧？不，准确地说，应该叫'救社主'……\"\n明明是一群根本不信神的家伙，却会不经意间冒出这样的喃喃自语。"}
]}
];
const T=document.getElementById('T'),M=document.getElementById('M');
lessons.forEach((l,i)=>{const t=document.createElement('button');t.textContent=l.num;if(i===0)t.className='on';t.onclick=()=>{document.querySelectorAll('.tabs button').forEach((b,j)=>b.classList.toggle('on',j===i));document.querySelectorAll('.L').forEach((d,j)=>d.classList.toggle('on',j===i));window.scrollTo({top:0,behavior:'smooth'});};T.appendChild(t);const d=document.createElement('div');d.className='L'+(i===0?' on':'');d.dataset.lid=''+l.id;let h='<div class="Lh"><div class="n">'+l.num+'</div><h2>'+l.title+'</h2><div class="a">'+l.author+'</div></div><div class="vi"></div>';l.sections.forEach((s,j)=>{if(s.subtitle)h+='<div class="st">'+s.subtitle+'</div>';const id='c'+l.id+'-'+j;h+='<div class="sec"><div class="jp">'+hp(s.jp,''+l.id)+'</div><button class="tb" onclick="tC(\''+id+'\',this)"><span class="ar">▶</span> 查看中文翻译</button><div class="cn" id="'+id+'">'+cp(s.cn)+'</div></div>';});d.innerHTML=h;M.appendChild(d);updateVi(d);});
function tC(id,btn){const e=document.getElementById(id);const s=e.classList.toggle('sh');btn.classList.toggle('op',s);btn.querySelector('.ar').nextSibling.textContent=s?' 收起中文翻译':' 查看中文翻译';}
function tA(show){const a=document.querySelector('.L.on');if(!a)return;a.querySelectorAll('.cn').forEach(e=>e.classList.toggle('sh',show));a.querySelectorAll('.tb').forEach(b=>{b.classList.toggle('op',show);const t=b.querySelector('.ar').nextSibling;if(t)t.textContent=show?' 收起中文翻译':' 查看中文翻译';});}
function tV(){const on=!document.body.classList.contains('vh');document.body.classList.toggle('vh',on);const b=document.getElementById('vb');b.classList.toggle('von',on);b.textContent=on?'👁️ 显示生词':'🟠 隐藏生词自测';if(on)document.querySelectorAll('.rv').forEach(e=>e.classList.remove('rv'));}
</script></body></html>
